url: "https://YinRa666.github.io"
baseurl: "/Portafolio-Data-Science"
repository: "YinRa666/Portafolio-Data-Science"
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
title: "Perfil Ejecutivo"

minimal_mistakes_skin: "contrast"
masthead_sticky: true
locale: "es-MX"

author:
  name: "Yaír Chávez"
  bio: "Transformar océanos de complejidad e incertidumbre en datos con valor estratégico."
  location: "<a href='https://www.google.com/maps/place/Ciudad+de+M%C3%A9xico,+CDMX/' target='_blank'>CDMX, México</a>"
  location_links:
    - label: "CDMX, México"
      url: "https://goo.gl/maps/39jL8p6M5E52"
  avatar: "/assets/images/perfil-profesional.jpg"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "<a href='https://www.linkedin.com/in/yair-chavez-actuary' target='_blank'>"
    - label: "WhatsApp"
      icon: "fab fa-fw fa-whatsapp"
      url: "<a href='https://wa.me/525520186345' target='_blank'>WhatsApp</a>"
    - label: "Gmail"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yair.chavez.castro@gmail.com"
author_profile: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      sidebar:
        nav: ""

external_links:
  target: "_blank"
  rel: "nofollow noopener noreferrer"

kramdown:
  header_nodes: [h1, h2, h3, h4, h5, h6]  
  anchor_links: false
  kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

url: "https://YinRa666.github.io"
baseurl: "/Portafolio-Data-Science"
repository: "YinRa666/Portafolio-Data-Science"
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
title: "Perfil Ejecutivo"

minimal_mistakes_skin: "contrast"
masthead_sticky: true
search: false
locale: "es-MX"

author:
  name: "Yaír Chávez"
  bio: "Transformar océanos de complejidad e incertidumbre en datos con valor estratégico."  
  #location: "<a href='https://www.google.com/maps/search/Azcapotzalco+CDMX' target='_blank' style='display: inline; vertical-align: middle; text-decoration: none;'>CDMX, México</a>"  
  location: "<a href='https://www.google.com/maps/search/Azcapotzalco+CDMX'>CDMX, México</a>"    
  avatar: "/assets/images/perfil-profesional.jpg"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yair-chavez-actuary"
    - label: "WhatsApp"
      icon: "fab fa-fw fa-whatsapp"
      url: "https://wa.me/525520186345"
    - label: "Gmail"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yair.chavez.castro@gmail.com"
author_profile: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      sidebar:
        nav: ""

external_links:
  target: "_blank"
  rel: "nofollow noopener noreferrer"

kramdown:
  header_nodes: [h1, h2, h3, h4, h5, h6]  
  anchor_links: false
  kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
